<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Jujutsu Kaisen: Domain Clash</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html, body {
      margin: 0; padding: 0; background: #000; color: #eee;
      font-family: 'Courier New', monospace; overflow: hidden; height: 100%; width: 100%;
    }
    #game-wrapper {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #0a0a14 0%, #000 70%);
    }
    canvas#game {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #04050a;
      box-shadow: 0 0 80px #5fd7ff22;
      /* Fill viewport while preserving 16:9 aspect ratio */
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      display: block;
    }
    #overlay {
      position: fixed; top: 8px; left: 8px;
      font-size: 12px; opacity: 0.55; pointer-events: none;
      text-shadow: 0 0 4px #000;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game" width="1280" height="720"></canvas>
  </div>
  <div id="overlay">JJK: Domain Clash &middot; F11 = browser fullscreen</div>
  <script type="module" src="../src/main.js"></script>
</body>
</html>
